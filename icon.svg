<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="36" fill="#1a1a2e"/>
  <rect width="192" height="192" rx="36" fill="none" stroke="#c9a227" stroke-width="6"/>
  <!-- Crossed swords icon -->
  <g transform="translate(96,96)">
    <!-- Blade 1 (top-left to bottom-right) -->
    <line x1="-50" y1="-50" x2="50" y2="50" stroke="#c9a227" stroke-width="7" stroke-linecap="round"/>
    <!-- Blade 2 (top-right to bottom-left) -->
    <line x1="50" y1="-50" x2="-50" y2="50" stroke="#c9a227" stroke-width="7" stroke-linecap="round"/>
    <!-- Crossguard 1 -->
    <line x1="-62" y1="-38" x2="-38" y2="-62" stroke="#c9a227" stroke-width="5" stroke-linecap="round"/>
    <!-- Crossguard 2 -->
    <line x1="38" y1="-62" x2="62" y2="-38" stroke="#c9a227" stroke-width="5" stroke-linecap="round"/>
    <!-- Pommel 1 -->
    <circle cx="-56" cy="56" r="6" fill="#c9a227"/>
    <!-- Pommel 2 -->
    <circle cx="56" cy="56" r="6" fill="#c9a227"/>
    <!-- Center gem -->
    <circle cx="0" cy="0" r="8" fill="#1a1a2e" stroke="#c9a227" stroke-width="3"/>
  </g>
  <!-- App name text -->
  <text x="96" y="170" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#c9a227" letter-spacing="1">W40K</text>
</svg>
